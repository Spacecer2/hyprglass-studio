version: "3.8"

services:
  hyprglass-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: hyprglass-studio:latest
    container_name: hyprglass-studio
    ports:
      - "8765:8765"
    environment:
      - STUDIO_HOST=0.0.0.0
      - STUDIO_PORT=8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
