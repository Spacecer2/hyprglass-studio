name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install ruff
      
      - name: Lint Python
        run: ruff check src/
      
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts/
          severity: warning
