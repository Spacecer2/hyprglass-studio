name: Security & Quality Checks

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback regex scan for high-entropy secrets
        if: failure()
        run: |
          echo "::group::Regex secret scan"
          # Scan for common secret patterns (AWS keys, private keys, tokens, etc.)
          set +e
          found=0
          patterns=(
            'AKIA[0-9A-Z]{16}'
            'ghp_[a-zA-Z0-9]{36}'
            'gho_[a-zA-Z0-9]{36}'
            'sk-[a-zA-Z0-9]{48}'
            'sk_live_[a-zA-Z0-9]{24,}'
            'BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY'
            'password\s*=\s*["\'][^"\']{8,}["\']'
          )
          for pattern in "${patterns[@]}"; do
            matches=$(git grep -n -E "$pattern" || true)
            if [ -n "$matches" ]; then
              echo "Potential secret matched: $pattern"
              echo "$matches"
              found=1
            fi
          done
          echo "::endgroup::"
          if [ "$found" -ne 0 ]; then
            echo "::error::Potential secrets detected by regex scan"
            exit 1
          fi

  validate-hyprglass-conf:
    name: Validate Hyprglass.conf
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find Hyprglass.conf
        id: find-conf
        run: |
          conf_files=$(find . -type f \( -iname 'hyprglass.conf' -o -iname '*.conf' \) | tr '\n' ' ')
          echo "files=$conf_files" >> "$GITHUB_OUTPUT"

      - name: Validate Hyprglass.conf syntax
        run: |
          conf_files="${{ steps.find-conf.outputs.files }}"
          if [ -z "$conf_files" ]; then
            echo "No .conf files found; skipping validation."
            exit 0
          fi

          failed=0
          for file in $conf_files; do
            echo "Checking $file"
            # Basic Hyprland/Hyprglass format checks:
            # - Reject lines with trailing whitespace
            # - Reject lines with spaces around '=' in assignments
            # - Reject unmatched braces (simple check)
            if grep -nE '[[:space:]]$' "$file"; then
              echo "::error file=$file::Trailing whitespace detected"
              failed=1
            fi
            # Flag assignment lines that look like 'key = value' (spaces around =)
            # Hyprland config typically uses 'key = value', so this is informational
            # and can be adjusted to match project conventions.
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          format: gcc
        env:
          SHELLCHECK_OPTS: -e SC1090 -e SC1091

  ruff:
    name: Ruff Python Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
          args: check --output-format=github

      - name: Run Ruff Format Check
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
          args: format --check
