# HyprGlass Studio profile
# This file uses Hyprland configuration syntax.

# Profile identity
$name = coding
$version = 1.0.0
$inherits = default

# Metadata
$metadata.author = HyprGlass Studio
$metadata.description = Subtle glass effect - higher opacity for maximum readability

# Glass effect settings
$glass.blur_strength = 1.5
$glass.blur_iterations = 1
$glass.refraction_strength = 0.4
$glass.chromatic_aberration = 0.1
$glass.fresnel_strength = 0.3
$glass.specular_strength = 0.2
$glass.glass_opacity = 0.8
$glass.edge_thickness = 0.05
$glass.lens_distortion = 0.1

# Theme settings
$theme.dark.brightness = 1.05
$theme.dark.contrast = 1.3
$theme.dark.saturation = 1.0
$theme.dark.vibrancy = 0.5
$theme.dark.vibrancy_darkness = 0.3
$theme.dark.adaptive_dim = 0.4
$theme.dark.adaptive_boost = 0.2

# Decoration settings
$decoration.active_opacity = 0.88
$decoration.inactive_opacity = 0.78

# Window rules
$window_rules.fullscreen.match = fullscreen:1
$window_rules.fullscreen.action = disable
$window_rules.fullscreen.reason = Fullscreen windows - glass disabled for unobstructed view
$window_rules.games.match = class:^steam_app_.+$,class:^gamescope$
$window_rules.games.action = disable
$window_rules.games.reason = Games - glass disabled for performance and compatibility
$window_rules.video_players.match = class:^(mpv|vlc|celluloid)$
$window_rules.video_players.action = minimal
$window_rules.video_players.reason = Video players - minimal glass to preserve video clarity
$window_rules.video_players.overrides.blur_strength = 1.0
$window_rules.video_players.overrides.glass_opacity = 0.3
$window_rules.video_players.overrides.active_opacity = 0.95
$window_rules.ides.match = class:^(code|vscodium|jetbrains-.+|zeditor|nvim)$
$window_rules.ides.action = subtle
$window_rules.ides.reason = IDEs and editors - subtle glass for readability
$window_rules.ides.overrides.blur_strength = 1.0
$window_rules.ides.overrides.glass_opacity = 0.85
$window_rules.ides.overrides.active_opacity = 0.92
$window_rules.ides.overrides.inactive_opacity = 0.85
$window_rules.browsers.match = class:^(firefox|chrome|chromium|brave|vivaldi|zen)$
$window_rules.browsers.action = subtle
$window_rules.browsers.reason = Browsers - subtle glass for distraction-free browsing
$window_rules.browsers.overrides.blur_strength = 2.0
$window_rules.browsers.overrides.glass_opacity = 0.75
$window_rules.browsers.overrides.active_opacity = 0.88
$window_rules.terminals.match = class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$
$window_rules.terminals.action = subtle
$window_rules.terminals.reason = Terminals - subtle glass for readability
$window_rules.terminals.overrides.blur_strength = 1.5
$window_rules.terminals.overrides.glass_opacity = 0.85
$window_rules.terminals.overrides.active_opacity = 0.9
$window_rules.terminals.overrides.inactive_opacity = 0.82
$window_rules.fallback.action = default
$window_rules.fallback.reason = All other windows use the profile defaults
