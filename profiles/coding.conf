{
  "name": "coding",
  "version": "1.0.0",
  "inherits": "default",
  "metadata": {
    "author": "HyprGlass Studio",
    "description": "Subtle glass effect - higher opacity for maximum readability"
  },
  "glass": {
    "blur_strength": 1.5,
    "blur_iterations": 1,
    "refraction_strength": 0.4,
    "chromatic_aberration": 0.1,
    "fresnel_strength": 0.3,
    "specular_strength": 0.2,
    "glass_opacity": 0.8,
    "edge_thickness": 0.05,
    "lens_distortion": 0.1
  },
  "theme": {
    "dark": {
      "brightness": 1.05,
      "contrast": 1.3,
      "saturation": 1.0,
      "vibrancy": 0.5,
      "vibrancy_darkness": 0.3,
      "adaptive_dim": 0.4,
      "adaptive_boost": 0.2
    }
  },
  "decoration": {
    "active_opacity": 0.88,
    "inactive_opacity": 0.78
  },
  "window_rules": {
    "fullscreen": {
      "match": ["fullscreen:1"],
      "action": "disable",
      "reason": "Fullscreen windows - glass disabled for unobstructed view"
    },
    "games": {
      "match": ["class:^steam_app_.+$", "class:^gamescope$"],
      "action": "disable",
      "reason": "Games - glass disabled for performance and compatibility"
    },
    "video_players": {
      "match": ["class:^(mpv|vlc|celluloid)$"],
      "action": "minimal",
      "reason": "Video players - minimal glass to preserve video clarity",
      "overrides": {
        "blur_strength": 1.0,
        "glass_opacity": 0.3,
        "active_opacity": 0.95
      }
    },
    "ides": {
      "match": ["class:^(code|vscodium|jetbrains-.+|zeditor|nvim)$"],
      "action": "subtle",
      "reason": "IDEs and editors - subtle glass for readability",
      "overrides": {
        "blur_strength": 1.0,
        "glass_opacity": 0.85,
        "active_opacity": 0.92,
        "inactive_opacity": 0.85
      }
    },
    "browsers": {
      "match": ["class:^(firefox|chrome|chromium|brave|vivaldi|zen)$"],
      "action": "subtle",
      "reason": "Browsers - subtle glass for distraction-free browsing",
      "overrides": {
        "blur_strength": 2.0,
        "glass_opacity": 0.75,
        "active_opacity": 0.88
      }
    },
    "terminals": {
      "match": ["class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$"],
      "action": "subtle",
      "reason": "Terminals - subtle glass for readability",
      "overrides": {
        "blur_strength": 1.5,
        "glass_opacity": 0.85,
        "active_opacity": 0.9,
        "inactive_opacity": 0.82
      }
    },
    "fallback": {
      "action": "default",
      "reason": "All other windows use the profile defaults"
    }
  }
}
