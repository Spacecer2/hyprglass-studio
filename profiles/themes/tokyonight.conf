# HyprGlass Studio theme preset
# Tokyo Night inspired color tuning for the glass effect.

# Theme identity
$name = tokyonight
$version = 1.0.0

# Metadata
$metadata.author = HyprGlass Studio
$metadata.description = Tokyo Night inspired dark theme with cool blues and purples

# Default theme this preset targets
$default_theme = dark

# Glass tint
$glass.tint_color = 0x7aa2f733

# Dark theme values
$theme.dark.brightness = 0.88
$theme.dark.contrast = 1.05
$theme.dark.saturation = 1.05
$theme.dark.vibrancy = 0.55
$theme.dark.vibrancy_darkness = 0.42
$theme.dark.adaptive_dim = 0.5
$theme.dark.adaptive_boost = 0.38

# Light theme values (for bright wallpapers)
$theme.light.brightness = 1.08
$theme.light.contrast = 0.98
$theme.light.saturation = 0.95
$theme.light.vibrancy = 0.2
$theme.light.vibrancy_darkness = 0.1
$theme.light.adaptive_dim = 0.15
$theme.light.adaptive_boost = 0.45
