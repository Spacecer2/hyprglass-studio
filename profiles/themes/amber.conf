# HyprGlass theme preset: amber
# Warm orange glass effect

# Theme identity
$name = amber
$metadata.author = HyprGlass Studio
$metadata.description = Warm orange glass effect for a cozy glow

# Theme parameters
$theme.amber.brightness = 0.95
