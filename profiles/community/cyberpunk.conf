# HyprGlass Studio profile
# This file uses Hyprland configuration syntax.

# Profile identity
$name = cyberpunk
$version = 1.0.0
$inherits = default

# Metadata
$metadata.author = HyprGlass Community
$metadata.description = Neon cyberpunk glass with high blur and magenta/cyan tint

# Glass effect settings
$glass.blur_strength = 5.0
$glass.blur_iterations = 3
$glass.refraction_strength = 1.2
$glass.chromatic_aberration = 1.1
$glass.fresnel_strength = 1.3
$glass.specular_strength = 0.9
$glass.glass_opacity = 0.92
$glass.edge_thickness = 0.22
$glass.lens_distortion = 0.55
$glass.tint_color = 0x90ff00ff

# Theme settings
$theme.dark.brightness = 1.05
$theme.dark.contrast = 1.45
$theme.dark.saturation = 1.5
$theme.dark.vibrancy = 0.95
$theme.dark.vibrancy_darkness = 0.35
$theme.dark.adaptive_dim = 0.45
$theme.dark.adaptive_boost = 0.55

# Decoration settings
$decoration.active_opacity = 0.82
$decoration.inactive_opacity = 0.70

# Window rules
$window_rules.fullscreen.match = fullscreen:1
$window_rules.fullscreen.action = disable
$window_rules.fullscreen.reason = Fullscreen windows - glass disabled for unobstructed view
$window_rules.games.match = class:^steam_app_.+$,class:^gamescope$
$window_rules.games.action = disable
$window_rules.games.reason = Games - glass disabled for performance and compatibility
$window_rules.video_players.match = class:^(mpv|vlc|celluloid)$
$window_rules.video_players.action = minimal
$window_rules.video_players.reason = Video players - minimal glass to preserve video clarity
$window_rules.video_players.overrides.blur_strength = 1.0
$window_rules.video_players.overrides.glass_opacity = 0.3
$window_rules.video_players.overrides.active_opacity = 0.95
$window_rules.browsers.match = class:^(firefox|chrome|chromium|brave|vivaldi|zen)$
$window_rules.browsers.action = full
$window_rules.browsers.reason = Browsers - full glass effect for immersive experience
$window_rules.browsers.overrides.blur_strength = 5.5
$window_rules.browsers.overrides.refraction_strength = 1.35
$window_rules.browsers.overrides.fresnel_strength = 1.5
$window_rules.terminals.match = class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$
$window_rules.terminals.action = subtle
$window_rules.terminals.reason = Terminals - subtle glass for readability
$window_rules.terminals.overrides.blur_strength = 2.5
$window_rules.terminals.overrides.glass_opacity = 0.75
$window_rules.terminals.overrides.active_opacity = 0.86
$window_rules.terminals.overrides.inactive_opacity = 0.76
$window_rules.fallback.action = default
$window_rules.fallback.reason = All other windows use the profile defaults
