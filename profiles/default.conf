{
  "name": "default",
  "version": "1.0.0",
  "inherits": null,
  "metadata": {
    "author": "HyprGlass Studio",
    "description": "Standard glass effect - balanced for everyday use"
  },
  "glass": {
    "blur_strength": 3.4,
    "blur_iterations": 2,
    "refraction_strength": 0.96,
    "chromatic_aberration": 0.7,
    "fresnel_strength": 0.96,
    "specular_strength": 0.6,
    "glass_opacity": 1.0,
    "edge_thickness": 0.14,
    "lens_distortion": 0.42
  },
  "theme": {
    "dark": {
      "brightness": 1.1,
      "contrast": 1.2,
      "saturation": 1.15,
      "vibrancy": 0.7,
      "vibrancy_darkness": 0.52,
      "adaptive_dim": 0.65,
      "adaptive_boost": 0.34
    }
  },
  "decoration": {
    "active_opacity": 0.75,
    "inactive_opacity": 0.65
  },
  "window_rules": {
    "fullscreen": {
      "match": ["class:^(.*)$", "fullscreen:1"],
      "action": "disable",
      "reason": "Fullscreen windows - glass disabled for unobstructed view"
    },
    "games": {
      "match": ["class:^steam_app_.+$", "class:^gamescope$"],
      "action": "disable",
      "reason": "Games - glass disabled for performance and compatibility"
    },
    "video_players": {
      "match": ["class:^(mpv|vlc|celluloid)$"],
      "action": "minimal",
      "reason": "Video players - minimal glass to preserve video clarity",
      "overrides": {
        "blur_strength": 1.0,
        "glass_opacity": 0.3,
        "active_opacity": 0.95
      }
    },
    "browsers": {
      "match": ["class:^(firefox|chrome|chromium|brave|vivaldi|zen)$"],
      "action": "full",
      "reason": "Browsers - full glass effect for immersive experience",
      "overrides": {
        "blur_strength": 4.0,
        "refraction_strength": 1.0,
        "fresnel_strength": 1.0
      }
    },
    "terminals": {
      "match": ["class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$"],
      "action": "subtle",
      "reason": "Terminals - subtle glass for readability",
      "overrides": {
        "blur_strength": 2.0,
        "glass_opacity": 0.7,
        "active_opacity": 0.85,
        "inactive_opacity": 0.75
      }
    },
    "fallback": {
      "action": "default",
      "reason": "All other windows use the profile defaults"
    }
  }
}
