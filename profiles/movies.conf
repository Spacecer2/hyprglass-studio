{
  "name": "movies",
  "version": "1.0.0",
  "inherits": "default",
  "metadata": {
    "author": "HyprGlass Studio",
    "description": "Minimal glass - cinema mode, cinematic experience"
  },
  "glass": {
    "blur_strength": 0.8,
    "blur_iterations": 1,
    "refraction_strength": 0.2,
    "chromatic_aberration": 0.0,
    "fresnel_strength": 0.15,
    "specular_strength": 0.1,
    "glass_opacity": 0.5,
    "edge_thickness": 0.02,
    "lens_distortion": 0.05
  },
  "theme": {
    "dark": {
      "brightness": 0.9,
      "contrast": 1.35,
      "saturation": 1.2,
      "vibrancy": 0.8,
      "vibrancy_darkness": 0.7,
      "adaptive_dim": 0.85,
      "adaptive_boost": 0.1
    }
  },
  "decoration": {
    "active_opacity": 0.6,
    "inactive_opacity": 0.5
  },
  "window_rules": {
    "fullscreen": {
      "match": ["fullscreen:1"],
      "action": "minimal",
      "reason": "Fullscreen windows - minimal glass for cinematic view",
      "overrides": {
        "blur_strength": 0.5,
        "glass_opacity": 0.2,
        "active_opacity": 0.98
      }
    },
    "games": {
      "match": ["class:^steam_app_.+$", "class:^gamescope$"],
      "action": "disable",
      "reason": "Games - glass disabled for performance and compatibility"
    },
    "video_players": {
      "match": ["class:^(mpv|vlc|celluloid)$"],
      "action": "disable",
      "reason": "Video players - glass disabled to preserve cinematic clarity"
    },
    "browsers": {
      "match": ["class:^(firefox|chrome|chromium|brave|vivaldi|zen)$"],
      "action": "subtle",
      "reason": "Browsers - subtle glass to avoid light bleed",
      "overrides": {
        "blur_strength": 1.5,
        "glass_opacity": 0.4,
        "active_opacity": 0.8
      }
    },
    "terminals": {
      "match": ["class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$"],
      "action": "subtle",
      "reason": "Terminals - subtle glass for readability",
      "overrides": {
        "blur_strength": 1.0,
        "glass_opacity": 0.5,
        "active_opacity": 0.85,
        "inactive_opacity": 0.75
      }
    },
    "fallback": {
      "action": "default",
      "reason": "All other windows use the profile defaults"
    }
  }
}
