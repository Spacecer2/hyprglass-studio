# HyprGlass Studio profile
# This file uses Hyprland configuration syntax.

# Profile identity
$name = movies
$version = 1.0.0
$inherits = default

# Metadata
$metadata.author = HyprGlass Studio
$metadata.description = Minimal glass - cinema mode, cinematic experience

# Glass effect settings
$glass.blur_strength = 0.8
$glass.blur_iterations = 1
$glass.refraction_strength = 0.2
$glass.chromatic_aberration = 0.0
$glass.fresnel_strength = 0.15
$glass.specular_strength = 0.1
$glass.glass_opacity = 0.5
$glass.edge_thickness = 0.02
$glass.lens_distortion = 0.05

# Theme settings
$theme.dark.brightness = 0.9
$theme.dark.contrast = 1.35
$theme.dark.saturation = 1.2
$theme.dark.vibrancy = 0.8
$theme.dark.vibrancy_darkness = 0.7
$theme.dark.adaptive_dim = 0.85
$theme.dark.adaptive_boost = 0.1

# Decoration settings
$decoration.active_opacity = 0.6
$decoration.inactive_opacity = 0.5

# Window rules
$window_rules.fullscreen.match = fullscreen:1
$window_rules.fullscreen.action = minimal
$window_rules.fullscreen.reason = Fullscreen windows - minimal glass for cinematic view
$window_rules.fullscreen.overrides.blur_strength = 0.5
$window_rules.fullscreen.overrides.glass_opacity = 0.2
$window_rules.fullscreen.overrides.active_opacity = 0.98
$window_rules.games.match = class:^steam_app_.+$,class:^gamescope$
$window_rules.games.action = disable
$window_rules.games.reason = Games - glass disabled for performance and compatibility
$window_rules.video_players.match = class:^(mpv|vlc|celluloid)$
$window_rules.video_players.action = disable
$window_rules.video_players.reason = Video players - glass disabled to preserve cinematic clarity
$window_rules.browsers.match = class:^(firefox|chrome|chromium|brave|vivaldi|zen)$
$window_rules.browsers.action = subtle
$window_rules.browsers.reason = Browsers - subtle glass to avoid light bleed
$window_rules.browsers.overrides.blur_strength = 1.5
$window_rules.browsers.overrides.glass_opacity = 0.4
$window_rules.browsers.overrides.active_opacity = 0.8
$window_rules.terminals.match = class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$
$window_rules.terminals.action = subtle
$window_rules.terminals.reason = Terminals - subtle glass for readability
$window_rules.terminals.overrides.blur_strength = 1.0
$window_rules.terminals.overrides.glass_opacity = 0.5
$window_rules.terminals.overrides.active_opacity = 0.85
$window_rules.terminals.overrides.inactive_opacity = 0.75
$window_rules.fallback.action = default
$window_rules.fallback.reason = All other windows use the profile defaults
