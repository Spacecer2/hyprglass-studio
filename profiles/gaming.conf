{
  "name": "gaming",
  "version": "1.0.0",
  "inherits": "default",
  "metadata": {
    "author": "HyprGlass Studio",
    "description": "Disabled glass - full opacity, no blur, maximum performance"
  },
  "glass": {
    "blur_strength": 0.0,
    "blur_iterations": 0,
    "refraction_strength": 0.0,
    "chromatic_aberration": 0.0,
    "fresnel_strength": 0.0,
    "specular_strength": 0.0,
    "glass_opacity": 0.0,
    "edge_thickness": 0.0,
    "lens_distortion": 0.0
  },
  "theme": {
    "dark": {
      "brightness": 1.0,
      "contrast": 1.0,
      "saturation": 1.0,
      "vibrancy": 0.0,
      "vibrancy_darkness": 0.0,
      "adaptive_dim": 0.0,
      "adaptive_boost": 0.0
    }
  },
  "decoration": {
    "active_opacity": 1.0,
    "inactive_opacity": 1.0
  },
  "window_rules": {
    "fullscreen": {
      "match": ["fullscreen:1"],
      "action": "disable",
      "reason": "Fullscreen windows - glass disabled for unobstructed view"
    },
    "games": {
      "match": ["class:^steam_app_.+$", "class:^gamescope$"],
      "action": "disable",
      "reason": "Games - glass disabled for performance and compatibility"
    },
    "video_players": {
      "match": ["class:^(mpv|vlc|celluloid)$"],
      "action": "disable",
      "reason": "Video players - glass disabled in gaming mode"
    },
    "browsers": {
      "match": ["class:^(firefox|chrome|chromium|brave|vivaldi|zen)$"],
      "action": "subtle",
      "reason": "Browsers - subtle glass to reduce overhead",
      "overrides": {
        "blur_strength": 1.0,
        "glass_opacity": 0.2,
        "active_opacity": 0.95
      }
    },
    "terminals": {
      "match": ["class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$"],
      "action": "default",
      "reason": "Terminals - use profile defaults"
    },
    "fallback": {
      "action": "default",
      "reason": "All other windows use the profile defaults"
    }
  }
}
