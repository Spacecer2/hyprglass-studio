# HyprGlass Studio profile
# This file uses Hyprland configuration syntax.

# Profile identity
$name = gaming
$version = 1.0.0
$inherits = default

# Metadata
$metadata.author = HyprGlass Studio
$metadata.description = Disabled glass - full opacity, no blur, maximum performance

# Glass effect settings
$glass.blur_strength = 0.0
$glass.blur_iterations = 0
$glass.refraction_strength = 0.0
$glass.chromatic_aberration = 0.0
$glass.fresnel_strength = 0.0
$glass.specular_strength = 0.0
$glass.glass_opacity = 0.0
$glass.edge_thickness = 0.0
$glass.lens_distortion = 0.0

# Theme settings
$theme.dark.brightness = 1.0
$theme.dark.contrast = 1.0
$theme.dark.saturation = 1.0
$theme.dark.vibrancy = 0.0
$theme.dark.vibrancy_darkness = 0.0
$theme.dark.adaptive_dim = 0.0
$theme.dark.adaptive_boost = 0.0

# Decoration settings
$decoration.active_opacity = 1.0
$decoration.inactive_opacity = 1.0

# Window rules
$window_rules.fullscreen.match = fullscreen:1
$window_rules.fullscreen.action = disable
$window_rules.fullscreen.reason = Fullscreen windows - glass disabled for unobstructed view
$window_rules.games.match = class:^steam_app_.+$,class:^gamescope$
$window_rules.games.action = disable
$window_rules.games.reason = Games - glass disabled for performance and compatibility
$window_rules.video_players.match = class:^(mpv|vlc|celluloid)$
$window_rules.video_players.action = disable
$window_rules.video_players.reason = Video players - glass disabled in gaming mode
$window_rules.browsers.match = class:^(firefox|chrome|chromium|brave|vivaldi|zen)$
$window_rules.browsers.action = subtle
$window_rules.browsers.reason = Browsers - subtle glass to reduce overhead
$window_rules.browsers.overrides.blur_strength = 1.0
$window_rules.browsers.overrides.glass_opacity = 0.2
$window_rules.browsers.overrides.active_opacity = 0.95
$window_rules.terminals.match = class:^(kitty|Alacritty|wezterm|foot|ghostty|com.mitchellh.ghostty)$
$window_rules.terminals.action = default
$window_rules.terminals.reason = Terminals - use profile defaults
$window_rules.fallback.action = default
$window_rules.fallback.reason = All other windows use the profile defaults
