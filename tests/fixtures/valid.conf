# Valid Hyprglass configuration
plugin:hyprglass {
    enabled = 1
    default_theme = dark
    default_preset = default
    blur_strength = 3.4
    blur_iterations = 2
    refraction_strength = 0.96
    chromatic_aberration = 0.7
    fresnel_strength = 0.96
    specular_strength = 0.6
    glass_opacity = 1.0
    edge_thickness = 0.14
    lens_distortion = 0.56

    dark:brightness = 1.1
    dark:contrast = 1.2
    dark:saturation = 1.15
    dark:vibrancy = 0.7
    dark:vibrancy_darkness = 0.52

    light:brightness = 1.05
    light:contrast = 0.92
    light:saturation = 0.85
    light:vibrancy = 0.12

    layers:enabled = 1
    layers:namespaces = waybar, swaync, notifications
    layers:preset = subtle
}

decoration {
    active_opacity = 0.86
    inactive_opacity = 0.72
    fullscreen_opacity = 1.0
}

# JaKooLit/Hyprland 0.55+ syntax: windowrule = match:<matcher>, <rule>
windowrule = match:class ^(waterfox)$, tag +browser
windowrule = match:class ^(waterfox)$, tag +hyprglass_enabled
windowrule = match:class ^(waterfox)$, tag +hyprglass_preset_glass
windowrule = match:class ^(waterfox)$, opacity 0.75 0.65
