plugin:hyprglass {
  enabled = 1
  default_theme = dark
  default_preset = default
  blur_strength = 2
  blur_iterations = 3
  refraction_strength = 0.6
  chromatic_aberration = 0.5
  fresnel_strength = 0.6
  specular_strength = 0.8
  glass_opacity = 1
  edge_thickness = 0.06
  lens_distortion = 0.5
}

decoration {
  active_opacity = 0.75
  inactive_opacity = 0.65
  fullscreen_opacity = 1
}
