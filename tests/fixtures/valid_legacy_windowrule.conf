# Valid legacy syntax: windowrulev2 warns but is accepted
plugin:hyprglass {
    enabled = 1
    default_theme = dark
    default_preset = default
    blur_strength = 3.4
    blur_iterations = 2
    refraction_strength = 0.96
    chromatic_aberration = 0.7
    fresnel_strength = 0.96
    specular_strength = 0.6
    glass_opacity = 1.0
    edge_thickness = 0.14
    lens_distortion = 0.56
}

decoration {
    active_opacity = 0.86
    inactive_opacity = 0.72
    fullscreen_opacity = 1.0
}

# Legacy syntax: rule before matcher
windowrulev2 = tag +browser, class:^(waterfox)$
